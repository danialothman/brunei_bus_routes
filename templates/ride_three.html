<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Ride · Three.js</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/ride.css') }}"
    />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <div id="ride-topbar">
      <span class="route-title" id="route-title">Loading…</span>
      <span class="engine-badge">Three.js</span>
      <span class="spacer"></span>
      <a id="exit" href="/">✕ Exit</a>
    </div>

    <div id="stop-banner"></div>

    <div id="stop-progress">
      <div class="sp-row sp-prev">
        <span class="sp-label">Prev</span>
        <span class="sp-name" id="sp-prev">—</span>
      </div>
      <div class="sp-row sp-next">
        <span class="sp-label">Next</span>
        <span class="sp-name" id="sp-next">—</span>
      </div>
    </div>

    <div id="minimap"></div>
    <div id="music-credit"></div>

    <div id="ride-controls">
      <button id="playpause" title="Play/Pause">⏸</button>
      <button id="toggle-stops" class="toggle-btn active" title="Show/hide stops" aria-pressed="true">🚏 Stops</button>
      <button id="toggle-minimap" class="toggle-btn active" title="Show/hide minimap" aria-pressed="true">🗺 Map</button>
      <span id="music-controls" class="music-controls">
        <button id="toggle-music" class="toggle-btn" title="Music" aria-pressed="false" aria-expanded="false">🎵 Music</button>
        <div id="music-panel" class="music-panel hidden" role="group" aria-label="Music controls">
          <button id="music-playpause" class="mini-btn" title="Play/Pause">▶</button>
          <button id="music-prev" class="mini-btn" title="Previous track">⏮</button>
          <button id="music-next" class="mini-btn" title="Next track">⏭</button>
          <button id="music-mute" class="vol-icon" title="Mute">🔊</button>
          <input id="music-volume" type="range" min="0" max="100" step="5" value="50" aria-label="Volume" />
        </div>
      </span>
      <div class="speed">
        <span>Speed</span>
        <input id="speed" type="range" min="10" max="120" step="5" value="40" />
        <span id="speed-val">40 km/h</span>
      </div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
    </div>

    <div id="ride-status">
      <div>Preparing your ride…</div>
      <div class="sub" id="ride-status-sub">Loading route & map tiles</div>
    </div>

    <!-- Shared config (ROUTE_COLORS) + geometry helper, then the ES module -->
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ride/route-path.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ride/minimap.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ride/ride-music.js') }}"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script
      type="module"
      src="{{ url_for('static', filename='js/ride/three-ride.js') }}"
    ></script>
  </body>
</html>
