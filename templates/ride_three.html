<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Ride · Three.js</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/ride.css', v=asset_v) }}"
    />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <div id="ride-topbar">
      <span class="route-title" id="route-title">Loading…</span>
      <span class="engine-badge">Three.js</span>
      <span class="spacer"></span>
      <a id="exit" href="/map">✕ Exit</a>
    </div>

    <div id="stop-banner"></div>

    <div id="stop-progress">
      <div class="rl-title">Stops</div>
      <div class="sp-row sp-prev">
        <span class="sp-label">Prev</span>
        <span class="sp-name" id="sp-prev">—</span>
      </div>
      <div class="sp-row sp-next">
        <span class="sp-label">Next</span>
        <span class="sp-name" id="sp-next">—</span>
      </div>
    </div>

    <!-- Planned-trip legs (hidden for plain routes); active leg highlights as you ride. -->
    <div id="ride-legs" class="hidden"></div>

    <!-- Arrival card: shown at the destination; replay / exit, dismissible. -->
    <div id="arrival-card" class="hidden">
      <button id="arrival-dismiss" class="arrival-x" title="Look around" aria-label="Dismiss">×</button>
      <div class="arrival-title">🏁 Arrived</div>
      <div class="arrival-sub" id="arrival-sub"></div>
      <div class="arrival-actions">
        <button type="button" id="arrival-replay">↻ Replay</button>
        <a id="arrival-exit" href="/map">Exit</a>
      </div>
    </div>

    <div id="minimap"></div>

    <!-- Minimal music controls live inside the now-playing credit pill. -->
    <div id="music-credit">
      <button id="music-mute" class="mc-btn" title="Mute">🔊</button>
      <input id="music-volume" type="range" min="0" max="100" step="5" value="50" class="mc-vol" aria-label="Volume" />
      <button id="music-next" class="mc-btn" title="Next track">⏭</button>
      <span id="music-credit-text" class="mc-text"></span>
      <button id="music-toggle" class="mc-btn mc-toggle" title="Collapse" aria-label="Collapse music player">‹</button>
    </div>

    <div id="ride-controls">
      <button id="prev-stop" title="Previous stop">⏮</button>
      <button id="playpause" title="Play/Pause">⏸</button>
      <button id="next-stop" title="Next stop">⏭</button>
      <button id="toggle-stops" class="toggle-btn active" title="Show/hide stops" aria-pressed="true">🚏 Stops</button>
      <button id="toggle-minimap" class="toggle-btn active" title="Show/hide minimap" aria-pressed="true">🗺 Map</button>
      <select id="mapStyle" class="ride-style" title="Map type">
        <option value="osm">OpenStreetMap</option>
        <option value="satellite">Satellite</option>
        <option value="terrain">Terrain</option>
        <option value="dark">Dark</option>
      </select>
      <div class="speed">
        <span>Speed</span>
        <input id="speed" type="range" min="10" max="120" step="5" value="40" />
        <span id="speed-val">40 km/h</span>
      </div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
    </div>

    <div id="ride-status">
      <div>Preparing your ride…</div>
      <div class="sub" id="ride-status-sub">Loading route & map tiles</div>
    </div>

    <!-- Shared config (ROUTE_COLORS) + geometry helper, then the ES module -->
    <script src="{{ url_for('static', filename='js/config.js', v=asset_v) }}"></script>
    <script src="{{ url_for('static', filename='js/ride/route-path.js', v=asset_v) }}"></script>
    <script src="{{ url_for('static', filename='js/ride/ride-legs.js', v=asset_v) }}"></script>
    <script src="{{ url_for('static', filename='js/ride/arrival.js', v=asset_v) }}"></script>
    <script src="{{ url_for('static', filename='js/ride/minimap.js', v=asset_v) }}"></script>
    <script src="{{ url_for('static', filename='js/ride/ride-music.js', v=asset_v) }}"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script
      type="module"
      src="{{ url_for('static', filename='js/ride/three-ride.js', v=asset_v) }}"
    ></script>
  </body>
</html>
